<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Context Notes</title>
    <link rel="icon" type="image/png" href="/static/icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-50 text-gray-900 h-[100dvh] overflow-hidden" onload="initApp()">
    <div class="max-w-3xl mx-auto h-full flex flex-col bg-white shadow-md relative">
        
        <header class="shrink-0 border-b px-4 py-3 bg-white flex flex-col sm:flex-row sm:justify-between items-start sm:items-center gap-3 z-30">
            <div class="flex items-center justify-between w-full sm:w-auto gap-3">
                <div class="flex items-center gap-3">
                    <h1 class="text-xl font-bold tracking-tight text-gray-800">Context Notes</h1>
                    <div class="flex items-center gap-1 border-l pl-3 border-gray-200">
                        <select id="context-select" onchange="changeContext()" class="custom-select text-xs font-medium border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500 bg-white py-1.5 pl-2 pr-7 shadow-sm cursor-pointer w-[110px] sm:w-[130px] truncate"></select>
                        <button onclick="createNewContext()" class="text-gray-400 hover:text-blue-600 px-2 py-1 bg-gray-50 hover:bg-blue-50 rounded-md text-lg font-light transition-all">+</button>
                        <button onclick="deleteCurrentContext()" class="text-gray-400 hover:text-red-600 px-2 py-1 bg-gray-50 hover:bg-red-50 rounded-md text-lg font-light transition-all">×</button>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between w-full sm:w-auto gap-2">
                <div class="flex items-center gap-1 flex-1 sm:flex-none">
                    <select id="model-select" class="custom-select text-[11px] font-semibold border border-transparent hover:border-gray-200 rounded-md bg-transparent hover:bg-gray-50 outline-none text-blue-600 cursor-pointer py-1 pl-1 pr-6 transition-all w-[100px] sm:w-[160px] truncate"></select>
                </div>
                
                <div class="flex gap-2 items-center">
                    <button id="tts-toggle" onclick="toggleTTS()" class="p-1.5 text-gray-400 rounded-full border border-transparent transition-all" title="Toggle Voice Response">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    <button onclick="toggleDocs()" class="text-xs sm:text-sm font-medium border border-gray-200 text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-50 transition-all shadow-sm">Memory</button>
                    <button onclick="clearChat()" class="text-xs sm:text-sm font-medium border border-red-100 text-red-600 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-all shadow-sm">Reset</button>
                </div>
            </div>
        </header>

        <div id="docs-panel" class="hidden absolute inset-0 z-50 bg-white flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b">
                <h2 class="text-sm font-bold uppercase tracking-widest text-gray-500">Context Memory</h2>
                <button onclick="toggleDocs()" class="text-gray-400 hover:text-gray-600 text-2xl px-2">×</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 sm:p-6">
                <section class="mb-6">
                    <h3 class="text-[10px] font-bold uppercase text-gray-400 mb-2 tracking-widest">Enrich Knowledge Base</h3>
                    <textarea id="doc-input" class="w-full p-3 rounded-lg border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white" rows="3" placeholder="Paste text..."></textarea>
                    <button onclick="addDoc()" class="w-full mt-2 bg-blue-600 text-white px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-700 shadow-sm transition-all">Extract Facts</button>
                </section>
                
                <section>
                    <div class="flex justify-between items-center mb-3 gap-4">
                        <h3 class="text-[10px] font-bold uppercase text-gray-400 tracking-widest whitespace-nowrap">Saved Facts</h3>
                        <input type="text" id="search-docs" onkeyup="filterDocs()" placeholder="Search entire database..." class="w-full p-2 text-xs border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-inner">
                    </div>
                    <div id="docs-list" class="space-y-2 mb-4"></div>
                </section>
            </div>

            <div class="border-t p-4 bg-gray-50 flex justify-between items-center">
                <button id="prev-btn" onclick="prevPage()" class="text-xs font-bold text-blue-600 disabled:text-gray-300">← Newer</button>
                <span class="text-[10px] text-gray-400 font-mono">PAGE <input type="number" id="page-input" class="w-10 text-center border-none bg-transparent font-bold"></span>
                <button id="next-btn" onclick="nextPage()" class="text-xs font-bold text-blue-600 disabled:text-gray-300">Older →</button>
            </div>
        </div>

        <main id="note-content" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 sm:space-y-8 z-0">
            <div class="text-center text-gray-400 mt-20 font-light italic" id="welcome-msg">Loading...</div>
        </main>

        <footer class="shrink-0 p-3 sm:p-4 border-t bg-white z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div class="flex gap-2 sm:gap-3">
                <div class="relative flex-1">
                    <input type="text" id="query-input" 
                        class="w-full p-3 sm:p-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-inner pr-10 sm:pr-12" 
                        placeholder="Ask or talk...">
                    <button id="mic-btn" onclick="toggleMic()" class="absolute right-2 top-2 sm:right-3 sm:top-2.5 p-1 text-gray-400 hover:text-red-500 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </button>
                </div>
                <button onclick="sendQuery()" class="bg-blue-600 text-white px-4 sm:px-6 py-2 rounded-xl font-bold text-sm sm:text-base hover:bg-blue-700 transition-all">Analyze</button>
            </div>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
